<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Quản lý sản phẩm</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="d-flex">
    <div th:replace="~{admin/fragments/sidebar :: sidebar}"></div>

    <div class="container-fluid p-4">
        <h2>🛒 Quản lý sản phẩm</h2>

        <form class="row g-3 mb-4" enctype="multipart/form-data"
              method="post" th:action="@{/admin/products/save}">
            <input name="maSP" th:value="${product.maSP}" type="hidden">
            <div class="col-md-4">
                <label class="form-label">Tên sản phẩm</label>
                <input class="form-control" name="tenSP" th:value="${product.tenSP}" type="text">
            </div>
            <div class="col-md-4">
                <label class="form-label">Giá</label>
                <input class="form-control" name="gia" th:value="${product.gia}" type="number">
            </div>
            <div class="col-md-4">
                <label class="form-label">Ảnh</label>
                <input class="form-control" name="file" type="file"> <!-- 👈 đổi ở đây -->
            </div>
            <div class="col-md-4">
                <label class="form-label">Số lượng</label>
                <input class="form-control" name="soLuong" th:value="${product.soLuong}" type="number">
            </div>
            <div class="col-md-4">
                <label class="form-label">Danh mục</label>
                <select class="form-select" name="loaiSanPham.maLoai">
                    <option th:each="c : ${categories}" th:text="${c.tenLoai}" th:value="${c.maLoai}"></option>
                </select>
            </div>
            <div class="col-12">
                <button class="btn btn-success">Lưu</button>
            </div>
        </form>

        <table class="table table-bordered table-striped">
            <thead>
            <tr>
                <th>#</th>
                <th>Tên</th>
                <th>Ảnh</th>
                <th>Giá</th>
                <th>Số lượng</th>
                <th>Danh mục</th>
                <th>Hành động</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="p : ${products}">
                <td th:text="${p.maSP}"></td>
                <td th:text="${p.tenSP}"></td>
                <td><img th:src="@{'/images/' + ${p.hinhAnh}}" width="80"></td>
                <td th:text="${p.gia}"></td>
                <td th:text="${p.soLuong}"></td>
                <td th:text="${p.loaiSanPham.tenLoai}"></td>
                <td>
                    <a class="btn btn-primary btn-sm" th:href="@{'/admin/products/edit/' + ${p.maSP}}">Sửa</a>
                    <a class="btn btn-danger btn-sm" th:href="@{'/admin/products/delete/' + ${p.maSP}}">Xóa</a>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</div>
</body>
</html>
