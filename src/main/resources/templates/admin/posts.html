<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>Quản lý Bài viết - Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --primary-red: #dc2626;
            --primary-gold: #fbbf24;
            --dark-red: #991b1b;
        }

        .sidebar {
            min-height: 100vh;
            background: linear-gradient(135deg, var(--primary-red), var(--dark-red));
            color: white;
        }

        .sidebar .nav-link {
            color: rgba(255, 255, 255, 0.8);
            padding: 12px 20px;
            transition: all 0.3s;
        }

        .sidebar .nav-link:hover,
        .sidebar .nav-link.active {
            background: rgba(255, 255, 255, 0.2);
            color: white;
        }

        .stat-card {
            border-radius: 12px;
            padding: 20px;
            color: white;
            background: linear-gradient(135deg, var(--primary-red), var(--dark-red));
            box-shadow: 0 4px 12px rgba(220, 38, 38, 0.3);
        }

        .btn-tet {
            background: linear-gradient(135deg, var(--primary-red), var(--dark-red));
            border: none;
            color: white;
            padding: 10px 20px;
            border-radius: 8px;
            transition: all 0.3s;
        }

        .btn-tet:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(220, 38, 38, 0.4);
            color: white;
        }

        .table-hover tbody tr:hover {
            background-color: rgba(251, 191, 36, 0.1);
        }

        .badge-status {
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.875rem;
        }

        .modal-header {
            background: linear-gradient(135deg, var(--primary-red), var(--dark-red));
            color: white;
        }
    </style>
</head>
<body>
<div class="d-flex">
    <!-- Sidebar -->
    <div class="sidebar" style="width: 250px;">
        <div class="p-4">
            <h4 class="text-center mb-4">🧧 Admin Panel</h4>
            <nav class="nav flex-column">
                <a class="nav-link" href="/admin/dashboard">
                    <i class="fas fa-chart-line"></i> Dashboard
                </a>
                <a class="nav-link" href="/admin/sanpham">
                    <i class="fas fa-box"></i> Sản phẩm
                </a>
                <a class="nav-link" href="/admin/orders">
                    <i class="fas fa-shopping-cart"></i> Đơn hàng
                </a>
                <a class="nav-link" href="/admin/taikhoan">
                    <i class="fas fa-users"></i> Tài khoản
                </a>
                <hr class="text-white-50">
                <a class="nav-link" href="/logout">
                    <i class="fas fa-sign-out-alt"></i> Đăng xuất
                </a>
            </nav>
        </div>
    </div>

    <!-- Main Content -->
    <div class="flex-grow-1 p-4">
        <!-- Header -->
        <div class="d-flex justify-content-between align-items-center mb-4">
            <div>
                <h2>📰 Quản lý Bài viết</h2>
                <p class="text-muted">Quản lý kiến thức Tết và tin tức</p>
            </div>
            <button class="btn btn-tet" data-bs-target="#addPostModal" data-bs-toggle="modal">
                <i class="fas fa-plus"></i> Thêm bài viết mới
            </button>
        </div>

        <!-- Alert Messages -->
        <div class="alert alert-success alert-dismissible fade show" role="alert" th:if="${success}">
            <i class="fas fa-check-circle"></i> <span th:text="${success}"></span>
            <button class="btn-close" data-bs-dismiss="alert" type="button"></button>
        </div>

        <div class="alert alert-danger alert-dismissible fade show" role="alert" th:if="${error}">
            <i class="fas fa-exclamation-circle"></i> <span th:text="${error}"></span>
            <button class="btn-close" data-bs-dismiss="alert" type="button"></button>
        </div>

        <!-- Search and Filter -->
        <div class="card mb-4">
            <div class="card-body">
                <form action="/admin/baiviet" class="row g-3" method="get">
                    <div class="col-md-6">
                        <input class="form-control" name="search" placeholder="Tìm kiếm theo tiêu đề..." th:value="${search}"
                               type="text">
                    </div>
                    <div class="col-md-3">
                        <select class="form-select" name="trangThai">
                            <option value="">Tất cả trạng thái</option>
                            <option th:selected="${trangThai == 'Hiển thị'}" value="Hiển thị">Hiển thị</option>
                            <option th:selected="${trangThai == 'Ẩn'}" value="Ẩn">Ẩn</option>
                        </select>
                    </div>
                    <div class="col-md-3">
                        <button class="btn btn-tet w-100" type="submit">
                            <i class="fas fa-search"></i> Tìm kiếm
                        </button>
                    </div>
                </form>
            </div>
        </div>

        <!-- Posts Table -->
        <div class="card">
            <div class="card-body">
                <div class="table-responsive">
                    <table class="table table-hover">
                        <thead>
                        <tr>
                            <th>ID</th>
                            <th>Tiêu đề</th>
                            <th>Tác giả</th>
                            <th>Ngày đăng</th>
                            <th>Trạng thái</th>
                            <th>Hành động</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:if="${baiVietPage == null or baiVietPage.content.isEmpty()}">
                            <td class="text-center py-4" colspan="6">
                                <i class="fas fa-inbox fa-3x text-muted mb-3"></i>
                                <p class="text-muted">Chưa có bài viết nào</p>
                            </td>
                        </tr>
                        <tr th:each="post : ${baiVietPage != null ? baiVietPage.content : #lists.emptyList()}">
                            <td th:text="${post.maBV}">1</td>
                            <td>
                                <strong th:text="${post.tieuDe}">Tiêu đề bài viết</strong>
                                <br>
                                <small class="text-muted"
                                       th:if="${post.noiDung != null and #strings.length(post.noiDung) > 80}">
                                    <span th:text="${#strings.substring(post.noiDung, 0, 80)} + '...'"></span>
                                </small>
                            </td>
                            <td th:text="${post.taiKhoan != null ? post.taiKhoan.hoTen : 'N/A'}">Admin</td>
                            <td th:text="${#temporals.format(post.ngayDang, 'dd/MM/yyyy HH:mm')}">01/01/2025</td>
                            <td>
                                <span class="badge badge-status"
                                      th:classappend="${post.trangThai == 'Hiển thị' ? 'bg-success' : 'bg-secondary'}"
                                      th:text="${post.trangThai}">
                                    Hiển thị
                                </span>
                            </td>
                            <td>
                                <button class="btn btn-sm btn-primary" onclick="editPost(this)"
                                        th:attr="data-id=${post.maBV},
                                                data-tieude=${post.tieuDe},
                                                data-noidung=${post.noiDung},
                                                data-hinhanh=${post.hinhAnh},
                                                data-trangthai=${post.trangThai}">
                                    <i class="fas fa-edit"></i>
                                </button>
                                <form class="d-inline"
                                      method="post" th:action="@{/admin/baiviet/{id}/toggle(id=${post.maBV})}">
                                    <button class="btn btn-sm btn-warning" type="submit">
                                        <i th:class="${post.trangThai == 'Hiển thị' ? 'fas fa-eye-slash' : 'fas fa-eye'}"></i>
                                    </button>
                                </form>
                                <form class="d-inline"
                                      method="post" onsubmit="return confirm('Bạn có chắc muốn xóa bài viết này?')"
                                      th:action="@{/admin/baiviet/{id}/delete(id=${post.maBV})}">
                                    <button class="btn btn-sm btn-danger" type="submit">
                                        <i class="fas fa-trash"></i>
                                    </button>
                                </form>
                            </td>
                        </tr>
                        </tbody>
                    </table>
                </div>

                <!-- Pagination -->
                <nav th:if="${baiVietPage != null and baiVietPage.totalPages > 1}">
                    <ul class="pagination justify-content-center">
                        <li class="page-item" th:classappend="${baiVietPage.first} ? 'disabled'">
                            <a class="page-link"
                               th:href="@{/admin/baiviet(page=${baiVietPage.number - 1}, search=${search}, trangThai=${trangThai})}">
                                Trước
                            </a>
                        </li>
                        <li class="page-item" th:classappend="${i == baiVietPage.number} ? 'active'"
                            th:each="i : ${#numbers.sequence(0, baiVietPage.totalPages - 1)}">
                            <a class="page-link"
                               th:href="@{/admin/baiviet(page=${i}, search=${search}, trangThai=${trangThai})}"
                               th:text="${i + 1}">1</a>
                        </li>
                        <li class="page-item" th:classappend="${baiVietPage.last} ? 'disabled'">
                            <a class="page-link"
                               th:href="@{/admin/baiviet(page=${baiVietPage.number + 1}, search=${search}, trangThai=${trangThai})}">
                                Sau
                            </a>
                        </li>
                    </ul>
                </nav>
            </div>
        </div>
    </div>
</div>

<!-- Add/Edit Post Modal -->
<div class="modal fade" id="addPostModal" tabindex="-1">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="modalTitle">
                    <i class="fas fa-plus-circle"></i> Thêm bài viết mới
                </h5>
                <button class="btn-close btn-close-white" data-bs-dismiss="modal" type="button"></button>
            </div>
            <form action="/admin/baiviet/save" id="postForm" method="post">
                <div class="modal-body">
                    <input id="postId" name="maBV" type="hidden">

                    <div class="mb-3">
                        <label class="form-label">Tiêu đề <span class="text-danger">*</span></label>
                        <input class="form-control" id="tieuDe" name="tieuDe" required type="text">
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Nội dung <span class="text-danger">*</span></label>
                        <textarea class="form-control" id="noiDung" name="noiDung" required rows="8"></textarea>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Hình ảnh (URL)</label>
                        <input class="form-control" id="hinhAnh" name="hinhAnh" placeholder="https://example.com/image.jpg"
                               type="text">
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Trạng thái</label>
                        <select class="form-select" id="trangThai" name="trangThai">
                            <option value="Hiển thị">Hiển thị</option>
                            <option value="Ẩn">Ẩn</option>
                        </select>
                    </div>
                </div>
                <div class="modal-footer">
                    <button class="btn btn-secondary" data-bs-dismiss="modal" type="button">Hủy</button>
                    <button class="btn btn-tet" type="submit">
                        <i class="fas fa-save"></i> Lưu bài viết
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    function editPost(button) {
        const id = button.getAttribute('data-id');
        const tieuDe = button.getAttribute('data-tieude');
        const noiDung = button.getAttribute('data-noidung');
        const hinhAnh = button.getAttribute('data-hinhanh');
        const trangThai = button.getAttribute('data-trangthai');

        document.getElementById('modalTitle').innerHTML = '<i class="fas fa-edit"></i> Chỉnh sửa bài viết';
        document.getElementById('postId').value = id;
        document.getElementById('tieuDe').value = tieuDe;
        document.getElementById('noiDung').value = noiDung;
        document.getElementById('hinhAnh').value = hinhAnh || '';
        document.getElementById('trangThai').value = trangThai;

        const modal = new bootstrap.Modal(document.getElementById('addPostModal'));
        modal.show();
    }

    // Reset form when opening for new post
    document.getElementById('addPostModal').addEventListener('hidden.bs.modal', function () {
        if (document.getElementById('postId').value === '') {
            document.getElementById('postForm').reset();
            document.getElementById('modalTitle').innerHTML = '<i class="fas fa-plus-circle"></i> Thêm bài viết mới';
        }
    });
</script>
</body>
</html>
