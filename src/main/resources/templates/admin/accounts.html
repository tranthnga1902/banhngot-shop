<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
>
<head>
    <meta charset="UTF-8">
    <title>Quản lý tài khoản</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="d-flex">
    <div th:replace="~{admin/fragments/sidebar :: sidebar}"></div>

    <div class="container-fluid p-4">
        <h2>👤 Quản lý tài khoản</h2>

        <!-- FORM TẠO / SỬA TÀI KHOẢN -->
        <form class="row g-3 mb-4" method="post" th:action="@{/admin/accounts/save}">
            <input name="maTK" th:value="${account.maTK}" type="hidden">

            <div class="col-md-4">
                <label class="form-label">Họ tên</label>
                <input class="form-control" name="hoTen" required th:value="${account.hoTen}" type="text">
            </div>

            <div class="col-md-4">
                <label class="form-label">Email</label>
                <input class="form-control" name="email" required th:value="${account.email}" type="email">
            </div>

            <div class="col-md-4">
                <label class="form-label">Mật khẩu</label>
                <input class="form-control" name="matKhau" th:value="${account.matKhau}" type="text">
                <small class="text-muted">Để trống để tạo mật khẩu mặc định 123456</small>
            </div>

            <div class="col-md-4">
                <label class="form-label">Vai trò</label>
                <select class="form-select" name="vaiTro.maVT">
                    <option th:each="r : ${vaiTros}" th:text="${r.tenVT}" th:value="${r.maVT}"></option>
                </select>
            </div>

            <div class="col-12">
                <button class="btn btn-success">Lưu</button>
            </div>
        </form>

        <!-- DANH SÁCH TÀI KHOẢN -->
        <table class="table table-striped">
            <thead>
            <tr>
                <th>#</th>
                <th>Họ tên</th>
                <th>Email</th>
                <th>Quyền</th>
                <th>Trạng thái</th>
                <th>Hành động</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="a : ${accounts}">
                <td th:text="${a.maTK}"></td>
                <td th:text="${a.hoTen}"></td>
                <td th:text="${a.email}"></td>
                <td th:text="${a.vaiTro.tenVT}"></td>
                <td><span th:text="${a.trangThai ? 'Hoạt động' : 'Khóa'}"></span></td>
                <td>
                    <a class="btn btn-primary btn-sm" th:href="@{'/admin/accounts/edit/' + ${a.maTK}}">Sửa</a>

                    <form method="post" style="display:inline"
                          th:action="@{'/admin/accounts/' + ${a.maTK} + '/toggle-status'}">
                        <button class="btn btn-warning btn-sm" th:text="${a.trangThai ? 'Khóa' : 'Mở'}"
                                type="submit"></button>
                    </form>

                    <form method="post" style="display:inline" th:action="@{'/admin/accounts/delete/' + ${a.maTK}}">
                        <button class="btn btn-danger btn-sm" type="submit">Xóa</button>
                    </form>
                </td>
            </tr>
            </tbody>
        </table>

        <!-- PHÂN TRANG -->
        <nav th:if="${totalPages > 1}">
            <ul class="pagination">
                <li class="page-item" th:classappend="${currentPage == 0}? 'disabled'">
                    <a class="page-link" th:href="@{/admin/accounts(page=${currentPage - 1}, size=${10})}">Trước</a>
                </li>
                <li class="page-item" th:classappend="${i == currentPage}? 'active'"
                    th:each="i : ${#numbers.sequence(0, totalPages - 1)}">
                    <a class="page-link" th:href="@{/admin/accounts(page=${i}, size=${10})}" th:text="${i + 1}"></a>
                </li>
                <li class="page-item" th:classappend="${currentPage + 1 >= totalPages}? 'disabled'">
                    <a class="page-link" th:href="@{/admin/accounts(page=${currentPage + 1}, size=${10})}">Sau</a>
                </li>
            </ul>
        </nav>

    </div>
</div>
</body>
</html>
