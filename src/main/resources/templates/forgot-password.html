<!DOCTYPE html>
<html lang="vi" xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      xmlns:th="http://www.thymeleaf.org">


<head>
    <th:block th:replace="~{fragments/layout :: head('Quên Mật Khẩu')}"></th:block>
    <link rel="stylesheet" th:href="@{/css/register.css}">
</head>


<body>
<!-- Floating Background Elements -->
<div class="floating-elements">
    <div class="floating-element">🧧</div>
    <div class="floating-element">🏮</div>
    <div class="floating-element">🎊</div>
    <div class="floating-element">✨</div>
</div>


<!-- Back to Home -->
<a class="back-home" href="/">
    <i class="fas fa-home"></i>
    <span>Về Trang Chủ</span>
</a>


<!-- Profile or Login Button -->
<div class="profile-menu" sec:authorize="isAuthenticated()">
    <div class="profile-circle">
        <a href="/profile" title="Thông tin cá nhân">
            <img alt="Profile" class="profile-avatar" src="/img/default-avatar.png">
        </a>
    </div>
</div>
<div class="login-button" sec:authorize="!isAuthenticated()">
    <a class="btn btn-primary" href="/login">Đăng nhập</a>
</div>


<!-- Main Forgot Password Wrapper -->
<div class="register-wrapper">
    <div class="register-container">
        <div class="row g-0">
            <!-- Left Panel - Branding -->
            <div class="col-md-6 col-lg-5">
                <div class="brand-panel">
                    <div class="brand-logo">
                        <h1 class="brand-title">CAKE</h1>
                        <p class="brand-subtitle">Khôi phục tài khoản</p>
                    </div>
                </div>
            </div>


            <!-- Right Panel - Forgot Password Form -->
            <div class="col-md-6 col-lg-7">
                <div class="form-panel">
                    <div class="form-header">
                        <h2 class="form-title">Quên Mật Khẩu?</h2>
                        <p class="form-subtitle">Nhập email đã đăng ký. Chúng tôi sẽ gửi mật khẩu mới cho bạn.</p>
                    </div>


                    <!-- Alert Messages -->
                    <div class="alert alert-success" th:if="${resetSuccess}">
                        <i class="fas fa-check-circle"></i>
                        <span>Mật khẩu mới đã được gửi về email của bạn!</span>
                    </div>

                    <div class="alert alert-danger" th:if="${resetError}">
                        <i class="fas fa-exclamation-triangle"></i>
                        <span th:text="${resetError}">Email không tồn tại trong hệ thống!</span>
                    </div>


                    <!-- Forgot Password Form -->
                    <form method="post" th:action="@{/forgot-password}">
                        <div class="form-floating-enhanced">
                            <i class="input-icon fas fa-envelope"></i>
                            <input autocomplete="email"
                                   class="form-control"
                                   id="resetEmail"
                                   name="email"
                                   placeholder=" "
                                   required
                                   type="email">
                            <label class="form-label" for="resetEmail">Địa chỉ Email</label>
                        </div>

                        <button class="btn-submit" type="submit">
                            <i class="fas fa-paper-plane"></i>
                            <span>Gửi mật khẩu mới</span>
                        </button>
                    </form>


                    <div class="divider">
                        <span>hoặc</span>
                    </div>


                    <div class="login-section">
                        <p class="login-text">Nhớ mật khẩu rồi?</p>
                        <a class="login-link" href="/login">
                            <i class="fas fa-sign-in-alt"></i>
                            <span>Đăng nhập ngay</span>
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>


</body>
</html>
