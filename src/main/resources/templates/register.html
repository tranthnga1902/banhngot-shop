<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">

<head>
    <th:block th:replace="~{fragments/layout :: head('Đăng Ký')}"></th:block>
    <link rel="stylesheet" th:href="@{/css/register1.css?v=2}">
</head>

<body>

<!-- Floating Background Elements -->
<div class="floating-elements">
    <div class="floating-element">🧁</div>
    <div class="floating-element">🍰</div>
    <div class="floating-element">🎂</div>
    <div class="floating-element">✨</div>
</div>

<!-- Back to Home -->
<a class="back-home" href="/">
    <i class="fas fa-home"></i>
    <span>Về Trang Chủ</span>
</a>

<!-- Main Register Wrapper -->
<div class="register-wrapper">
    <div class="register-container">
        <div class="row g-0">

            <!-- LEFT PANEL — Register Form -->
            <div class="col-md-6 col-lg-7">
                <div class="form-panel">

                    <div class="form-header">
                        <h2 class="form-title">Đăng Ký Tài Khoản</h2>
                        <p class="form-subtitle">Tạo tài khoản để đặt bánh và nhận ưu đãi đặc biệt.</p>
                    </div>

                    <!-- Alert Messages -->
                    <div class="alert alert-danger" th:if="${errorMessage}">
                        <i class="fas fa-exclamation-triangle"></i>
                        <span th:text="${errorMessage}">Có lỗi xảy ra!</span>
                    </div>

                    <!-- Register Form — all name/id attrs unchanged -->
                    <form id="registerForm" method="post" th:action="@{/register}">

                        <!-- Họ và Tên — full width -->
                        <div class="form-floating-enhanced">
                            <input autocomplete="name"
                                   class="form-control"
                                   id="hoTen"
                                   maxlength="100"
                                   name="hoTen"
                                   placeholder=" "
                                   required
                                   type="text">
                            <label class="form-label" for="hoTen">Họ và Tên</label>
                        </div>

                        <!-- Email -->
                        <div class="form-floating-enhanced">
                            <input autocomplete="email"
                                   class="form-control"
                                   id="email"
                                   maxlength="100"
                                   name="email"
                                   placeholder=" "
                                   required
                                   type="email">
                            <label class="form-label" for="email">Địa chỉ Email</label>
                        </div>

                        <!-- Số điện thoại -->
                        <div class="form-floating-enhanced">
                            <input autocomplete="tel"
                                   class="form-control"
                                   id="soDienThoai"
                                   maxlength="20"
                                   name="soDienThoai"
                                   placeholder=" "
                                   type="tel">
                            <label class="form-label" for="soDienThoai">Số Điện Thoại</label>
                        </div>

                        <!-- Password + Confirm — two-column like reference -->
                        <div class="form-row-half">
                            <div class="form-floating-enhanced">
                                <input autocomplete="new-password"
                                       class="form-control"
                                       id="matKhau"
                                       minlength="6"
                                       name="matKhau"
                                       placeholder=" "
                                       required
                                       type="password">
                                <label class="form-label" for="matKhau">Mật Khẩu</label>
                                <button aria-label="Toggle password visibility"
                                        class="password-toggle"
                                        onclick="togglePassword('matKhau', 'passwordIcon1')"
                                        type="button">
                                    <i class="fas fa-eye" id="passwordIcon1"></i>
                                </button>
                                <div class="password-strength">
                                    <div class="password-strength-bar" id="passwordStrengthBar"></div>
                                </div>
                                <div class="password-strength-text" id="passwordStrengthText"></div>
                            </div>

                            <div class="form-floating-enhanced">
                                <input autocomplete="new-password"
                                       class="form-control"
                                       id="confirmPassword"
                                       name="confirmPassword"
                                       placeholder=" "
                                       required
                                       type="password">
                                <label class="form-label" for="confirmPassword">Xác Nhận Mật Khẩu</label>
                                <button aria-label="Toggle password visibility"
                                        class="password-toggle"
                                        onclick="togglePassword('confirmPassword', 'passwordIcon2')"
                                        type="button">
                                    <i class="fas fa-eye" id="passwordIcon2"></i>
                                </button>
                            </div>
                        </div>

                        <!-- Newsletter checkbox (like reference image) -->
                        <div class="newsletter-check">
                            <input id="newsletter" name="newsletter" type="checkbox" checked>
                            <label for="newsletter">Nhận thông báo về bánh mới và ưu đãi độc quyền.</label>
                        </div>

                        <!-- Submit button — right-aligned like reference -->
                        <button class="btn-register" id="registerBtn" type="submit">
                            <span>Đăng Ký</span>
                        </button>

                    </form>

                    <div class="divider">
                        <span>hoặc</span>
                    </div>

                    <div class="login-section">
                        <p class="login-text">Đã có tài khoản?</p>
                        <a class="login-link" th:href="@{/login}">
                            <span>Đăng nhập tại đây</span>
                        </a>
                    </div>

                </div>
            </div>

            <!-- RIGHT PANEL — Bakery Image -->
            <div class="col-md-6 col-lg-5">
                <div class="brand-panel">
                    <img th:src="@{/img/image1.png}"
                         src="/img/image1.png"
                         alt="Bakery Shop"
                         style="
                            position:absolute;
                            inset:0;
                            width:100%;
                            height:100%;
                            object-fit:cover;
                            object-position:center;
                            display:block;
                         "
                         onerror="this.style.display='none'">

                    <!-- Fallback gradient nếu chưa load được ảnh -->
                    <div style="
                        position:absolute;
                        inset:0;
                        background: linear-gradient(160deg, #FAD4D4 0%, #F5ECD8 50%, #D4ECE4 100%);
                        display:flex;
                        align-items:center;
                        justify-content:center;
                        flex-direction:column;
                        gap:1rem;
                        z-index:-1;
                    ">
                        <span style="font-size:5rem; opacity:0.45;">🎂</span>
                        <span style="
                            font-family:'Playfair Display',serif;
                            font-size:1.4rem;
                            color:#5D4037;
                            font-weight:700;
                            letter-spacing:0.06em;
                        ">Bakery Shop</span>
                    </div>
                </div>
            </div>

        </div>
    </div>
</div>

<!-- Scripts — logic giữ nguyên hoàn toàn -->
<script>
    function togglePassword(fieldId, iconId) {
        const passwordField = document.getElementById(fieldId);
        const passwordIcon = document.getElementById(iconId);
        if (passwordField.type === 'password') {
            passwordField.type = 'text';
            passwordIcon.className = 'fas fa-eye-slash';
        } else {
            passwordField.type = 'password';
            passwordIcon.className = 'fas fa-eye';
        }
    }

    function checkPasswordStrength(password) {
        const strengthBar = document.getElementById('passwordStrengthBar');
        const strengthText = document.getElementById('passwordStrengthText');
        let strength = 0;
        let text = '';
        let className = '';

        if (password.length >= 6) strength++;
        if (password.match(/[a-z]+/)) strength++;
        if (password.match(/[A-Z]+/)) strength++;
        if (password.match(/[0-9]+/)) strength++;
        if (password.match(/[$@#&!]+/)) strength++;

        switch (strength) {
            case 0: case 1: text = 'Mật khẩu yếu';  className = 'password-strength-weak';   break;
            case 2:          text = 'Mật khẩu khá';  className = 'password-strength-fair';   break;
            case 3: case 4:  text = 'Mật khẩu tốt';  className = 'password-strength-good';   break;
            case 5:          text = 'Mật khẩu mạnh'; className = 'password-strength-strong'; break;
        }

        strengthBar.className = 'password-strength-bar ' + className;
        strengthText.textContent = text;
    }

    document.addEventListener('DOMContentLoaded', function () {
        const form = document.getElementById('registerForm');
        const registerBtn = document.getElementById('registerBtn');

        form.addEventListener('submit', function () {
            registerBtn.classList.add('loading');
            registerBtn.disabled = true;
            setTimeout(() => {
                registerBtn.classList.remove('loading');
                registerBtn.disabled = false;
            }, 10000);
        });

        const inputs = document.querySelectorAll('.form-control');
        inputs.forEach(input => {
            input.addEventListener('focus', function () {
                this.closest('.form-floating-enhanced').style.transform = 'translateY(-1px)';
            });
            input.addEventListener('blur', function () {
                this.closest('.form-floating-enhanced').style.transform = 'translateY(0)';
            });
            input.addEventListener('input', function () {
                if (this.validity.valid) {
                    this.classList.remove('error');
                    this.classList.add('valid');
                } else {
                    this.classList.remove('valid');
                    this.classList.add('error');
                }
            });
        });

        const passwordField = document.getElementById('matKhau');
        passwordField.addEventListener('input', function () {
            checkPasswordStrength(this.value);
        });

        const confirmPasswordField = document.getElementById('confirmPassword');
        confirmPasswordField.addEventListener('input', function () {
            if (passwordField.value !== this.value) {
                this.setCustomValidity('Mật khẩu xác nhận không khớp');
                this.classList.add('error');
                this.classList.remove('valid');
            } else {
                this.setCustomValidity('');
                this.classList.remove('error');
                this.classList.add('valid');
            }
        });

        const alerts = document.querySelectorAll('.alert');
        alerts.forEach(alert => {
            setTimeout(() => {
                alert.style.transition = 'all 0.5s ease';
                alert.style.opacity = '0';
                alert.style.transform = 'translateY(-20px)';
                setTimeout(() => alert.remove(), 500);
            }, 5000);
        });
    });
</script>

</body>
</html>
